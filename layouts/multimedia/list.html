{{ define "main" }}
<header class="mb-10">
  <h1 class="text-3xl font-bold">{{ .Title }}</h1>
  {{ with .Description }}<p class="mt-2 text-lg text-neutral-500 dark:text-neutral-400">{{ . }}</p>{{ end }}
</header>
<div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
  {{ range .Pages }}
  <article class="group rounded-2xl border border-neutral-200 dark:border-neutral-700 overflow-hidden bg-white dark:bg-neutral-800 transition-all duration-300 hover:shadow-xl hover:-translate-y-1">
    <div class="relative">
      {{- with .Params.thumb }}
      <img src="{{ . }}" alt="{{ $.Title }}" class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-105" />
      {{- else }}
      <div class="h-40 bg-gradient-to-br from-primary-500/15 via-neutral-400/10 to-secondary-500/20 dark:from-primary-600/25 dark:via-neutral-600/15 dark:to-secondary-600/25 flex items-center justify-center">
        <svg class="w-12 h-12 text-primary-300/40 dark:text-primary-500/30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
      </div>
      {{- end }}
      {{ with .Params.duration }}
      <span class="absolute bottom-2 right-2 px-2 py-0.5 text-xs font-mono bg-black/70 text-white rounded-md backdrop-blur-sm">{{ . }}</span>
      {{ end }}
      {{ with .Params.mediaType }}
      <span class="absolute top-2 left-2 px-2.5 py-0.5 text-xs font-semibold bg-secondary-500 text-white rounded-md shadow-sm">{{ . }}</span>
      {{ end }}
    </div>
    <div class="p-5">
      <h2 class="text-lg font-semibold mb-1 transition-colors duration-200">
        <a href="{{ .RelPermalink }}" class="hover:text-primary-500">{{ .Title }}</a>
      </h2>
      <p class="text-sm text-neutral-600 dark:text-neutral-300 line-clamp-2">{{ .Summary }}</p>
    </div>
  </article>
  {{ end }}
</div>
{{ end }}
