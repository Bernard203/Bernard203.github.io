{{ define "main" }}
<header class="mb-10">
  <h1 class="text-3xl font-bold">{{ .Title }}</h1>
  {{ with .Description }}<p class="mt-2 text-lg text-neutral-500 dark:text-neutral-400">{{ . }}</p>{{ end }}
</header>
<div class="grid gap-8 sm:grid-cols-2">
  {{ range .Pages }}
  <article class="group rounded-2xl overflow-hidden border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-800 transition-all duration-300 hover:shadow-xl hover:-translate-y-1">
    {{- with .Params.thumb }}
    <div class="overflow-hidden">
      <img src="{{ . }}" alt="{{ $.Title }}" class="w-full h-64 object-cover transition-transform duration-500 group-hover:scale-105" />
    </div>
    {{- else }}
    <div class="h-52 bg-gradient-to-br from-secondary-300/20 via-primary-400/10 to-primary-500/20 dark:from-secondary-500/20 dark:via-primary-600/15 dark:to-primary-700/25 flex items-center justify-center">
      <svg class="w-16 h-16 text-primary-300/40 dark:text-primary-500/30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42"/></svg>
    </div>
    {{- end }}
    <div class="p-6">
      <h2 class="text-xl font-semibold mb-2 transition-colors duration-200">
        <a href="{{ .RelPermalink }}" class="hover:text-primary-500">{{ .Title }}</a>
      </h2>
      <p class="text-sm text-neutral-600 dark:text-neutral-300 leading-relaxed">{{ .Summary }}</p>
      {{ with .Params.tools }}
      <div class="flex flex-wrap gap-1.5 mt-4">
        {{ range . }}
        <span class="px-2.5 py-0.5 text-xs font-medium rounded-full bg-secondary-50 dark:bg-secondary-900/50 text-secondary-600 dark:text-secondary-300 ring-1 ring-secondary-200/50 dark:ring-secondary-700/50">{{ . }}</span>
        {{ end }}
      </div>
      {{ end }}
    </div>
  </article>
  {{ end }}
</div>
{{ end }}
