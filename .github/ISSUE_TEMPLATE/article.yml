name: "文章 / Article"
description: "发布一篇文章 / Publish an article"
labels: ["type:article"]
body:
  - type: dropdown
    id: language
    attributes:
      label: "语言 / Language"
      options:
        - "lang:bilingual"
        - "lang:zh"
        - "lang:en"
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: "标签 / Tags"
      description: "逗号分隔 / Comma-separated"
      placeholder: "技术, 随笔, tutorial"
  - type: textarea
    id: content
    attributes:
      label: "内容 / Content"
      description: "双语请用 ## zh-cn 和 ## en 分隔 / For bilingual, separate with ## zh-cn and ## en"
      value: |
        ## zh-cn
        ### 标题
        中文标题

        中文内容...

        ## en
        ### Title
        English Title

        English content...
    validations:
      required: true
