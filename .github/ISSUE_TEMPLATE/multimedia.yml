name: "多媒体 / Multimedia"
description: "发布多媒体内容 / Publish multimedia content"
labels: ["type:multimedia"]
body:
  - type: dropdown
    id: language
    attributes:
      label: "语言 / Language"
      options:
        - "lang:bilingual"
        - "lang:zh"
        - "lang:en"
    validations:
      required: true
  - type: dropdown
    id: media_type
    attributes:
      label: "媒体类型 / Media Type"
      options:
        - Video
        - Audio
        - Animation
        - Interactive
    validations:
      required: true
  - type: input
    id: duration
    attributes:
      label: "时长 / Duration"
      placeholder: "3:45"
  - type: input
    id: embed_url
    attributes:
      label: "嵌入链接 / Embed URL"
      description: "YouTube, Bilibili 等 / YouTube, Bilibili, etc."
      placeholder: "https://..."
  - type: textarea
    id: content
    attributes:
      label: "内容 / Content"
      description: "双语请用 ## zh-cn 和 ## en 分隔 / For bilingual, separate with ## zh-cn and ## en"
      value: |
        ## zh-cn
        ### 标题
        中文标题

        中文内容...

        ## en
        ### Title
        English Title

        English content...
    validations:
      required: true
