name: "设计作品 / Design Work"
description: "发布一个设计作品 / Publish a design work"
labels: ["type:design"]
body:
  - type: dropdown
    id: language
    attributes:
      label: "语言 / Language"
      options:
        - "lang:bilingual"
        - "lang:zh"
        - "lang:en"
    validations:
      required: true
  - type: input
    id: tools
    attributes:
      label: "工具 / Tools"
      description: "逗号分隔 / Comma-separated"
      placeholder: "Figma, Photoshop, Blender"
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: "内容 / Content"
      description: "双语请用 ## zh-cn 和 ## en 分隔 / For bilingual, separate with ## zh-cn and ## en"
      value: |
        ## zh-cn
        ### 标题
        中文标题

        中文内容...

        ## en
        ### Title
        English Title

        English content...
    validations:
      required: true
